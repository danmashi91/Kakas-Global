<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <!-- Wheat stalk icon -->
  <g transform="translate(30, 10)">
    <!-- Center stalk -->
    <line x1="35" y1="100" x2="35" y2="5" stroke="#8B6914" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Top grain kernel -->
    <ellipse cx="35" cy="6" rx="9" ry="15" fill="#C9940A"/>
    <!-- Left kernels -->
    <ellipse cx="21" cy="26" rx="7.5" ry="13" fill="#D4A012" transform="rotate(-28,21,26)"/>
    <ellipse cx="19" cy="48" rx="7" ry="12" fill="#C9940A" transform="rotate(-24,19,48)"/>
    <ellipse cx="20" cy="68" rx="6.5" ry="11" fill="#D4A012" transform="rotate(-20,20,68)"/>
    <!-- Right kernels -->
    <ellipse cx="49" cy="26" rx="7.5" ry="13" fill="#C9940A" transform="rotate(28,49,26)"/>
    <ellipse cx="51" cy="48" rx="7" ry="12" fill="#D4A012" transform="rotate(24,51,48)"/>
    <ellipse cx="50" cy="68" rx="6.5" ry="11" fill="#C9940A" transform="rotate(20,50,68)"/>
    <!-- Root curl -->
    <path d="M35,100 Q28,108 22,104" fill="none" stroke="#8B6914" stroke-width="2" stroke-linecap="round"/>
    <path d="M35,100 Q42,108 48,104" fill="none" stroke="#8B6914" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Vertical separator -->
  <line x1="108" y1="18" x2="108" y2="102" stroke="#C9940A" stroke-width="1.2" opacity="0.5"/>

  <!-- KAKA'S -->
  <text x="124" y="55" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" fill="#3D2800" letter-spacing="1">KAKA'S</text>
  <!-- GLOBAL -->
  <text x="124" y="88" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" fill="#3D2800" letter-spacing="1">GLOBAL</text>
  <!-- LIMITED -->
  <text x="126" y="108" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#8B6914" letter-spacing="7">LIMITED</text>

  <!-- Tagline -->
  <text x="126" y="118" font-family="Georgia, 'Times New Roman', serif" font-size="9.5" fill="#C9940A" letter-spacing="1.5" font-style="italic">Nigeria's Finest Agricultural Exports</text>
</svg>
