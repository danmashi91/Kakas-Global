<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Brand dark background -->
  <rect width="180" height="180" rx="36" fill="#3D2800"/>

  <!-- Large wheat stalk centered -->
  <g transform="translate(90, 90)">
    <!-- Stalk -->
    <line x1="0" y1="70" x2="0" y2="-65" stroke="#D4A012" stroke-width="5" stroke-linecap="round"/>
    <!-- Top kernel -->
    <ellipse cx="0" cy="-65" rx="14" ry="24" fill="#F0C040"/>
    <!-- Left kernels -->
    <ellipse cx="-20" cy="-38" rx="12" ry="20" fill="#E8B820" transform="rotate(-28,-20,-38)"/>
    <ellipse cx="-22" cy="-8" rx="11" ry="18" fill="#F0C040" transform="rotate(-24,-22,-8)"/>
    <ellipse cx="-20" cy="20" rx="10" ry="17" fill="#E8B820" transform="rotate(-20,-20,20)"/>
    <ellipse cx="-18" cy="46" rx="9" ry="15" fill="#F0C040" transform="rotate(-15,-18,46)"/>
    <!-- Right kernels -->
    <ellipse cx="20" cy="-38" rx="12" ry="20" fill="#F0C040" transform="rotate(28,20,-38)"/>
    <ellipse cx="22" cy="-8" rx="11" ry="18" fill="#E8B820" transform="rotate(24,22,-8)"/>
    <ellipse cx="20" cy="20" rx="10" ry="17" fill="#F0C040" transform="rotate(20,20,20)"/>
    <ellipse cx="18" cy="46" rx="9" ry="15" fill="#E8B820" transform="rotate(15,18,46)"/>
    <!-- Roots -->
    <path d="M0,70 Q-14,82 -24,76" fill="none" stroke="#D4A012" stroke-width="4" stroke-linecap="round"/>
    <path d="M0,70 Q14,82 24,76" fill="none" stroke="#D4A012" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
