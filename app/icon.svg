<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Golden background circle -->
  <rect width="32" height="32" rx="6" fill="#3D2800"/>
  <!-- Simplified wheat for small size -->
  <line x1="16" y1="28" x2="16" y2="4" stroke="#D4A012" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Top kernel -->
  <ellipse cx="16" cy="5" rx="3.5" ry="6" fill="#F0C040"/>
  <!-- Left kernels -->
  <ellipse cx="10" cy="12" rx="3" ry="5.5" fill="#E8B820" transform="rotate(-28,10,12)"/>
  <ellipse cx="9" cy="20" rx="2.8" ry="5" fill="#F0C040" transform="rotate(-22,9,20)"/>
  <!-- Right kernels -->
  <ellipse cx="22" cy="12" rx="3" ry="5.5" fill="#F0C040" transform="rotate(28,22,12)"/>
  <ellipse cx="23" cy="20" rx="2.8" ry="5" fill="#E8B820" transform="rotate(22,23,20)"/>
  <!-- Root ticks -->
  <path d="M16,28 Q12,31 9,29.5" fill="none" stroke="#D4A012" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M16,28 Q20,31 23,29.5" fill="none" stroke="#D4A012" stroke-width="1.2" stroke-linecap="round"/>
</svg>
